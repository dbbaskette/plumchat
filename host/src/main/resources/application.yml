server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
cors:
  allowed-origins: ["http://localhost:5173"]

plumchat:
  ui:
    allowed-origins: http://localhost:5173
  cors:
    allow-credentials: true
  mcp:
    schema:
      base-url: http://localhost:8081
    query:
      base-url: http://localhost:8082
    mgmt:
      base-url: http://localhost:8083


